[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "LOG",    # flake8-logging
    "RET",    # flake8-return
    "PT",     # flake8-pytest-style
    "RUF",    # ruff-specific rules
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "RUF012", # mutable class attrs need ClassVar — HA convention skips this
]
allowed-confusables = ["×"]  # Used deliberately for decidegrees notation (°C × 10).

[tool.ruff.lint.isort]
force-sort-within-sections = true
known-first-party = ["custom_components.fluidra_pool"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.mypy]
# Strict type checking enforced in CI (Platinum `strict-typing`).
# 3.13 matches the CI runtime and the Home Assistant 2026.x requirement (HA ships
# PEP 696 syntax that mypy cannot parse under an older target).
python_version = "3.13"
strict = true
ignore_missing_imports = true

[tool.bandit]
exclude_dirs = ["tests", ".venv"]
skips = ["B101", "B105", "B110"]  # B101: assert, B105: hardcoded password (false positive on const names), B110: try/except/pass (common in HA)

[tool.codespell]
skip = "*.json,*.yaml,*.yml,.git"
ignore-words-list = "hass,informations,authentification,formater,potentiel,complet,valide,conflit,conflits,groupe,correspondant,mis"
