rules:
  # Bronze
  action-setup: done
  appropriate-polling: done
  brands:
    status: exempt
    comment: Custom integration distributed through HACS.
  common-modules: done
  config-flow: done
  config-flow-test-coverage:
    status: todo
    comment: Expand config-flow tests to include MFA and reauth flows.
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage:
    status: todo
    comment: Platform tests (switch/sensor/climate/light) and reauth/MFA flows are not yet exercised.

  # Gold
  devices: done
  diagnostics: done
  discovery-update-info:
    status: exempt
    comment: Cloud-polling integration; no local discovery protocol.
  discovery:
    status: exempt
    comment: Cloud-polling integration; no local discovery protocol.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: todo
    comment: Newly-added pool devices require a reload; dynamic add/remove not yet implemented.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: done
  repair-issues: done
  stale-devices:
    status: todo
    comment: Removed pool devices are not automatically purged from the device registry.

  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing:
    status: todo
    comment: mypy --strict is not yet enforced in CI.
