name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN: every CI job only reads the checked-out repo.
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Ruff check
        uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89 # v4.1.0
        with:
          args: "check --output-format=github"

      - name: Ruff format check
        uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89 # v4.1.0
        with:
          args: "format --check"

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.14"

      - name: Cache pre-commit environments
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit hooks (bandit, codespell, hygiene)
        env:
          # ruff runs as a dedicated pinned action above — no need to repeat it.
          SKIP: ruff-check,ruff-format
        run: |
          python -m pip install --upgrade pip pre-commit
          pre-commit run --all-files --show-diff-on-failure

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: HACS Validation
        uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa # main
        with:
          category: integration

      - name: Hassfest
        uses: home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c # master

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=custom_components/fluidra_pool \
            --cov-report=term-missing \
            --cov-fail-under=90

  typing:
    name: Typing (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt

      # Strict type check (Platinum strict-typing). Config lives in pyproject.toml
      # ([tool.mypy] strict = true).
      - name: Run mypy (strict)
        run: mypy custom_components/fluidra_pool/

  floor-compat:
    name: Floor compat (HA floor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          # HA floor (hacs.json) requires Python 3.13; the test/typing jobs use 3.14.
          python-version: "3.13"
          cache: pip

      - name: Install the declared HA floor + runtime deps
        run: |
          python -m pip install --upgrade pip
          FLOOR=$(python -c "import json; print(json.load(open('hacs.json'))['homeassistant'])")
          REQS=$(python -c "import json; print(' '.join(json.load(open('custom_components/fluidra_pool/manifest.json'))['requirements']))")
          pip install "homeassistant==${FLOOR}" ${REQS}

      - name: Import-sweep against the floor
        run: python scripts/check_floor_compat.py
